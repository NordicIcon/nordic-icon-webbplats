<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 460px;
    height: 940px;
  }
  .phone {
    position: relative;
    width: 380px;
    height: 820px;
    background: #1a1a1a;
    border-radius: 52px;
    border: 10px solid #2a2a2a;
    box-shadow:
      0 0 0 1px #111,
      inset 0 0 0 1px #333,
      0 60px 120px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    right: -13px;
    top: 120px;
    width: 4px;
    height: 80px;
    background: #2a2a2a;
    border-radius: 0 3px 3px 0;
    box-shadow: 0 100px 0 #2a2a2a;
  }
  .phone::after {
    content: '';
    position: absolute;
    left: -13px;
    top: 100px;
    width: 4px;
    height: 50px;
    background: #2a2a2a;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 70px 0 #2a2a2a, 0 130px 0 #2a2a2a;
  }
  /* Dynamic Island */
  .island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
  /* Status bar */
  .statusbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: flex-end;
    padding: 0 28px 8px;
    justify-content: space-between;
    z-index: 9;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
  }
  .time {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .icons svg { fill: #fff; }
  /* Screen content */
  .screen {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    border-radius: 44px;
  }
  .screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }
  /* Bottom browser bar */
  .browser-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 88px;
    background: rgba(30,30,30,0.96);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 10px;
    gap: 10px;
    z-index: 10;
    border-top: 0.5px solid rgba(255,255,255,0.1);
  }
  .url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 14px;
    width: calc(100% - 32px);
  }
  .url-text {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.2px;
    flex: 1;
    text-align: center;
  }
  .browser-icons {
    display: flex;
    justify-content: space-around;
    width: 100%;
    padding: 0 20px;
  }
  .browser-icons svg { fill: rgba(255,255,255,0.6); }
  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
    z-index: 11;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <img src="public/images/koppar-mobile.jpg" alt="">
    </div>
    <div class="island"></div>
    <div class="statusbar">
      <span class="time">09:41</span>
      <div class="icons">
        <!-- Signal -->
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="7" width="3" height="5" rx="0.5"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM8 6a5.5 5.5 0 0 1 4.1 1.85l-1.3 1.3A3.5 3.5 0 0 0 8 8a3.5 3.5 0 0 0-2.8 1.15l-1.3-1.3A5.5 5.5 0 0 1 8 6zm0-4a9.5 9.5 0 0 1 7.1 3.2L13.8 6.5A7.5 7.5 0 0 0 8 4a7.5 7.5 0 0 0-5.8 2.5L.9 5.2A9.5 9.5 0 0 1 8 2z"/></svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="3" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" fill="none"/><rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="rgba(255,255,255,0.5)"/></svg>
      </div>
    </div>
    <div class="browser-bar">
      <div class="url-bar">
        <span class="url-text">nordicicon.se/projekt/koppar</span>
      </div>
      <div class="browser-icons">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
</body>
</html>
